name = "lamcs-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output"

# Cloudflare D1 database binding (SQLite-compatible).
# Replace database_id with the ID from `wrangler d1 create lamcs-db`.
[[d1_databases]]
binding = "DB"
database_name = "lamcs-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
migrations_dir = "prisma/migrations"
